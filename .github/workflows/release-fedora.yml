name: Release Fedora

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # Only stable tags (v1.0.0), not RC (v1.0.0-rc.1)

permissions:
  contents: read

jobs:
  build-srpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y golang rpm-build rpmlint curl copr-cli glibc-langpack-en

      - name: Vendor Go dependencies
        run: go mod vendor

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update spec version
        run: |
          sed -i "s/^%global app_version.*/%global app_version     ${{ steps.version.outputs.VERSION }}/" \
            packaging/fedora/dabri.spec

      - name: Lint spec file
        run: rpmlint -r packaging/fedora/.rpmlintrc packaging/fedora/dabri.spec

      - name: Create SRPM
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          
          # Copy spec
          cp packaging/fedora/dabri.spec ~/rpmbuild/SPECS/
          
          # Create vendored tarball
          VERSION="${{ steps.version.outputs.VERSION }}"
          tar --transform "s,^,dabri-${VERSION}/," \
              --exclude='.git' \
              --exclude='build' \
              --exclude='dist' \
              --exclude='lib' \
              -czf ~/rpmbuild/SOURCES/dabri-${VERSION}-vendored.tar.gz \
              cmd/ config/ hotkeys/ audio/ whisper/ output/ websocket/ internal/ \
              vendor/ \
              go.mod go.sum \
              Makefile LICENSE README.md \
              config.yaml \
              io.github.ashbuk.dabri.desktop \
              io.github.ashbuk.dabri.appdata.xml \
              icons/ docs/ packaging/
          
          # Download whisper.cpp
          WHISPER_VERSION=$(grep -E '^%global whisper_version' packaging/fedora/dabri.spec | awk '{print $3}')
          curl -L -o ~/rpmbuild/SOURCES/whisper-cpp-${WHISPER_VERSION}.tar.gz \
            "https://github.com/ggml-org/whisper.cpp/archive/refs/tags/v${WHISPER_VERSION}.tar.gz"
          
          # Build SRPM
          rpmbuild -bs ~/rpmbuild/SPECS/dabri.spec

      - name: Upload SRPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: srpm
          path: ~/rpmbuild/SRPMS/*.src.rpm

      - name: Submit to COPR
        env:
          COPR_API_TOKEN: ${{ secrets.COPR_API_TOKEN }}
        run: |
          # Configure copr-cli
          mkdir -p ~/.config
          cat > ~/.config/copr <<EOF
          [copr-cli]
          copr_url = https://copr.fedorainfracloud.org
          login = ${{ secrets.COPR_LOGIN }}
          username = ${{ secrets.COPR_USERNAME }}
          token = ${COPR_API_TOKEN}
          EOF
          chmod 600 ~/.config/copr
          
          # Submit build
          SRPM=~/rpmbuild/SRPMS/dabri-${{ steps.version.outputs.VERSION }}-1.fc43.src.rpm
          copr-cli build dabri "$SRPM"
